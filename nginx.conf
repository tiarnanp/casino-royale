# ─────────────────────────────────────────────────────────────
#  VaultBet — Nginx reverse proxy config
#
#  Place this file at:
#    /etc/nginx/sites-available/vaultbet
#
#  Then enable it:
#    sudo ln -s /etc/nginx/sites-available/vaultbet /etc/nginx/sites-enabled/
#    sudo nginx -t
#    sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name localhost;

    access_log /var/log/nginx/vaultbet_access.log;
    error_log  /var/log/nginx/vaultbet_error.log;

    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "no-referrer" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
    }

    client_max_body_size 10M;
}
